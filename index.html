<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Naranja con Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fefaf6; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="p-2 md:p-6 font-sans text-gray-800">
    <div class="max-w-md mx-auto">
        
        <div class="bg-gradient-to-r from-orange-600 to-amber-500 rounded-t-xl p-4 text-white shadow-lg flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-xl font-extrabold uppercase tracking-tight">Torta de Naranja</h1>
                <p class="text-orange-100 text-[9px] font-medium tracking-widest uppercase italic">Producción: Fernando Araujo</p>
            </div>
            <button onclick="toggleSettings()" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <div class="bg-white rounded-b-xl card-shadow border border-orange-50 p-3">
            
            <div id="settings-panel" class="hidden bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-200 mb-4">
                <h3 class="text-xs font-black text-gray-500 uppercase mb-3 flex items-center justify-between">
                    Editar Precios por Gramo ($)
                    <button onclick="toggleSettings()" class="text-red-500">Cerrar</button>
                </h3>
                <div id="prices-editor" class="grid grid-cols-1 gap-2">
                    </div>
                <button onclick="savePrices()" class="mt-4 w-full bg-green-600 text-white font-bold py-2 rounded-lg text-xs">GUARDAR NUEVOS PRECIOS</button>
            </div>

            <div class="flex p-1 bg-gray-100 rounded-lg mb-4 text-[11px]">
                <button onclick="setShape('cuadrado')" id="btn-cuadrado" class="flex-1 py-2 font-bold rounded-md transition-all bg-white shadow text-orange-600">CUADRADA</button>
                <button onclick="setShape('redondo')" id="btn-redondo" class="flex-1 py-2 font-bold rounded-md transition-all text-gray-500 uppercase text-center">REDONDA</button>
            </div>

            <section class="bg-orange-50/50 p-3 rounded-lg border border-orange-100 mb-4">
                <div id="inputs-container" class="grid grid-cols-2 gap-2"></div>
            </section>

            <div class="bg-white overflow-hidden">
                <table class="w-full table-auto">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-tighter border-b border-gray-100">
                            <th class="px-1 py-2 text-left">Ingrediente</th>
                            <th class="px-1 py-2 text-right">Peso</th>
                            <th class="px-1 py-2 text-right">Costo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-gray-50"></tbody>
                    <tfoot class="border-t-2 border-orange-100">
                        <tr class="bg-orange-600 text-white">
                            <td colspan="2" class="px-2 py-3 font-bold text-[11px] rounded-l-lg uppercase">Costo Total</td>
                            <td id="total-costo" class="px-2 py-3 text-right font-black text-xl rounded-r-lg">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <button onclick="copyToClipboard()" class="mt-4 w-full bg-gray-800 text-white font-bold py-3 rounded-lg text-xs shadow-md active:scale-95 transition-all">
                COPIAR LISTA
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2 rounded-full text-[10px] font-bold opacity-0 transition-opacity pointer-events-none">
        ¡PRECIOS ACTUALIZADOS!
    </div>

    <script>
        let currentShape = 'cuadrado';
        
        // Precios por defecto si no hay nada guardado
        const preciosBase = {
            "Harina": 0.00126, "Sal": 0.00040, "Azúcar": 0.00160, "Aceite": 0.00458,
            "Huevos": 0.004467, "Polvo de Hornear": 0.01620, "Jugo de Naranja": 0.00200, "Vainilla": 0.00200
        };

        let preciosActuales = {};

        const recetaBase = [
            { id: 1, nombre: "Harina", porcentaje: 100.0 },
            { id: 2, nombre: "Jugo de Naranja", porcentaje: 39.2 },
            { id: 3, nombre: "Azúcar", porcentaje: 95.7 },
            { id: 4, nombre: "Polvo de Hornear", porcentaje: 3.4 },
            { id: 5, nombre: "Aceite", porcentaje: 32.6 },
            { id: 6, nombre: "Sal", porcentaje: 2.3 },
            { id: 7, nombre: "Huevos", porcentaje: 71.9 },
            { id: 8, nombre: "Vainilla", porcentaje: 3.0 }
        ];

        // Cargar precios de la memoria del navegador
        function loadPrices() {
            const stored = localStorage.getItem('precios_naranja');
            if (stored) {
                preciosActuales = JSON.parse(stored);
            } else {
                preciosActuales = {...preciosBase};
            }
            renderPricesEditor();
        }

        // Crear los inputs del panel de ajustes
        function renderPricesEditor() {
            const container = document.getElementById('prices-editor');
            container.innerHTML = '';
            for (const [nombre, precio] of Object.entries(preciosActuales)) {
                container.innerHTML += `
                    <div class="flex items-center justify-between gap-2 bg-white p-2 rounded-lg border border-gray-100">
                        <span class="text-[10px] font-bold text-gray-600">${nombre}</span>
                        <input type="number" step="0.000001" value="${precio}" data-ing="${nombre}" 
                            class="price-input w-24 text-right text-xs font-mono bg-orange-50 p-1 rounded border border-orange-100 outline-none">
                    </div>
                `;
            }
        }

        function savePrices() {
            const inputs = document.querySelectorAll('.price-input');
            inputs.forEach(input => {
                const nombre = input.getAttribute('data-ing');
                preciosActuales[nombre] = parseFloat(input.value);
            });
            localStorage.setItem('precios_naranja', JSON.stringify(preciosActuales));
            showToast("¡PRECIOS ACTUALIZADOS!");
            toggleSettings();
            calcular();
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('hidden');
        }

        function setShape(shape) {
            currentShape = shape;
            document.getElementById('btn-cuadrado').className = shape === 'cuadrado' ? "flex-1 py-2 font-bold rounded-md bg-white shadow text-orange-600" : "flex-1 py-2 font-bold rounded-md text-gray-500 uppercase text-center";
            document.getElementById('btn-redondo').className = shape === 'redondo' ? "flex-1 py-2 font-bold rounded-md bg-white shadow text-orange-600 uppercase text-center" : "flex-1 py-2 font-bold rounded-md text-gray-500 text-center";
            renderInputs();
            calcular();
        }

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            const inputStyle = "w-full bg-white p-2 rounded-lg border border-orange-200 outline-none text-sm font-bold shadow-sm";
            if (currentShape === 'cuadrado') {
                container.innerHTML = `
                    <div class="col-span-2"><label class="text-[9px] font-bold text-orange-700 uppercase">Altura</label><input type="number" id="altura" value="2.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase">Profundidad</label><input type="number" id="profundidad" value="28" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase">Largo</label><input type="number" id="largo" value="39" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                `;
            } else {
                container.innerHTML = `
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase">Diámetro</label><input type="number" id="diametro" value="14.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="text-[9px] font-bold text-orange-700 uppercase">Altura</label><input type="number" id="altura" value="9.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                `;
            }
        }

        function calcular() {
            let volumen = 0;
            const h = parseFloat(document.getElementById('altura').value) || 0;
            if (currentShape === 'cuadrado') {
                const p = parseFloat(document.getElementById('profundidad').value) || 0;
                const l = parseFloat(document.getElementById('largo').value) || 0;
                volumen = h * p * l;
            } else {
                const d = parseFloat(document.getElementById('diametro').value) || 0;
                volumen = Math.PI * Math.pow(d / 2, 2) * h;
            }

            const dens = currentShape === 'cuadrado' ? (1147 / (2.5*28*39)) : (659.1 / (Math.PI*Math.pow(14.5/2, 2)*9.5));
            const pesoTotal = volumen * dens;
            const pesoHarina = pesoTotal / (recetaBase.reduce((a, b) => a + b.porcentaje, 0) / 100);

            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            let costoAcumulado = 0;

            recetaBase.forEach(ing => {
                const gramos = (pesoHarina * ing.porcentaje) / 100;
                const costo = gramos * (preciosActuales[ing.nombre] || 0);
                costoAcumulado += costo;

                tbody.innerHTML += `
                    <tr class="text-[13px]">
                        <td class="px-1 py-3 font-semibold text-gray-700">${ing.nombre}</td>
                        <td class="px-1 py-3 text-right font-bold text-orange-600 no-wrap">${Math.round(gramos)}g</td>
                        <td class="px-1 py-3 text-right text-gray-500 font-mono text-[12px] no-wrap">$${costo.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('total-costo').innerText = '$' + costoAcumulado.toFixed(2);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        async function copyToClipboard() {
            let text = `📋 TORTA NARANJA - ${document.getElementById('total-costo').innerText}\n---\n`;
            document.querySelectorAll('#tabla-body tr').forEach(tr => {
                text += `${tr.cells[0].innerText}: ${tr.cells[1].innerText}\n`;
            });
            await navigator.clipboard.writeText(text);
            showToast("¡LISTA COPIADA!");
        }

        window.onload = () => { loadPrices(); renderInputs(); calcular(); };
    </script>
</body>
</html>
