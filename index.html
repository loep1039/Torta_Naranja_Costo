<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Naranja Mobile-First</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fefaf6; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        /* Evita que el texto se rompa en varias líneas en peso y costo */
        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="p-2 md:p-6 font-sans text-gray-800">
    <div class="max-w-md mx-auto"> <div class="bg-gradient-to-r from-orange-600 to-amber-500 rounded-t-xl p-4 text-white shadow-lg text-center">
            <h1 class="text-xl font-extrabold uppercase tracking-tight">Torta de Naranja</h1>
            <p class="text-orange-100 text-[9px] font-medium tracking-widest uppercase italic">Producción de Fernando Araujo</p>
        </div>

        <div class="bg-white rounded-b-xl card-shadow border border-orange-50 p-3 md:p-5">
            
            <div class="flex p-1 bg-gray-100 rounded-lg mb-4 text-[11px]">
                <button onclick="setShape('cuadrado')" id="btn-cuadrado" class="flex-1 py-2 font-bold rounded-md transition-all bg-white shadow text-orange-600">CUADRADA</button>
                <button onclick="setShape('redondo')" id="btn-redondo" class="flex-1 py-2 font-bold rounded-md transition-all text-gray-500 uppercase">REDONDA</button>
            </div>

            <section class="bg-orange-50/50 p-3 rounded-lg border border-orange-100 mb-4">
                <div id="inputs-container" class="grid grid-cols-2 gap-2">
                    </div>
            </section>

            <div class="bg-white">
                <table class="w-full table-auto">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-tighter border-b border-gray-100">
                            <th class="hidden sm:table-cell px-1 py-2 text-left">#</th>
                            <th class="px-1 py-2 text-left">Ingrediente</th>
                            <th class="px-1 py-2 text-right">Peso</th>
                            <th class="px-1 py-2 text-right">Costo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-gray-50">
                        </tbody>
                    <tfoot class="border-t-2 border-orange-100">
                        <tr class="text-gray-600">
                            <td class="hidden sm:table-cell"></td>
                            <td class="px-1 py-2 text-[10px] font-bold uppercase">Total Masa</td>
                            <td id="total-gramos" class="px-1 py-2 text-right font-bold text-gray-800 no-wrap">0 g</td>
                            <td></td>
                        </tr>
                        <tr class="bg-orange-600 text-white shadow-inner">
                            <td colspan="2" class="px-2 py-3 font-bold text-[11px] sm:text-xs rounded-l-lg uppercase">Costo Total</td>
                            <td id="total-costo" colspan="2" class="px-2 py-3 text-right font-black text-xl rounded-r-lg">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <button onclick="copyToClipboard()" class="mt-4 w-full bg-gray-800 active:bg-black active:scale-[0.96] text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2 text-xs shadow-md">
                COPIAR LISTA
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-6 py-2 rounded-full text-[10px] font-bold opacity-0 transition-opacity pointer-events-none z-50">
        ¡COPIADO AL PORTAPAPELES!
    </div>

    <script>
        let currentShape = 'cuadrado';
        const preciosPorGramo = {
            "Harina": 0.00126, "Sal": 0.00040, "Azúcar": 0.00160, "Aceite": 0.00458,
            "Huevos": 0.004467, "Polvo de Hornear": 0.01620, "Jugo de Naranja": 0.00200, "Vainilla": 0.00200
        };

        const recetaBase = [
            { id: 1, nombre: "Harina", porcentaje: 100.0 },
            { id: 2, nombre: "Jugo de Naranja", porcentaje: 39.2 },
            { id: 3, nombre: "Azúcar", porcentaje: 95.7 },
            { id: 4, nombre: "Polvo de Hornear", porcentaje: 3.4 },
            { id: 5, nombre: "Aceite", porcentaje: 32.6 },
            { id: 6, nombre: "Sal", porcentaje: 2.3 },
            { id: 7, nombre: "Huevos", porcentaje: 71.9 },
            { id: 8, nombre: "Vainilla", porcentaje: 3.0 }
        ];

        const DENSIDAD_CUADRADA = 1147.0 / (2.5 * 28 * 39);
        const DENSIDAD_REDONDA = 659.1 / (Math.PI * Math.pow(14.5 / 2, 2) * 9.5);

        function setShape(shape) {
            currentShape = shape;
            document.getElementById('btn-cuadrado').className = shape === 'cuadrado' ? "flex-1 py-2 font-bold rounded-md bg-white shadow text-orange-600" : "flex-1 py-2 font-bold rounded-md text-gray-500 uppercase";
            document.getElementById('btn-redondo').className = shape === 'redondo' ? "flex-1 py-2 font-bold rounded-md bg-white shadow text-orange-600 uppercase" : "flex-1 py-2 font-bold rounded-md text-gray-500";
            renderInputs();
            calcular();
        }

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            const labelStyle = "text-[9px] font-bold text-orange-700 uppercase mb-1 block";
            const inputStyle = "w-full bg-white p-2 rounded-lg border border-orange-200 outline-none text-sm font-bold shadow-sm focus:border-orange-500";
            
            if (currentShape === 'cuadrado') {
                container.innerHTML = `
                    <div class="col-span-2"><label class="${labelStyle}">Altura (cm)</label><input type="number" id="altura" value="2.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="${labelStyle}">Profundidad</label><input type="number" id="profundidad" value="28" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="${labelStyle}">Largo</label><input type="number" id="largo" value="39" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                `;
            } else {
                container.innerHTML = `
                    <div><label class="${labelStyle}">Diámetro (cm)</label><input type="number" id="diametro" value="14.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                    <div><label class="${labelStyle}">Altura (cm)</label><input type="number" id="altura" value="9.5" step="0.1" oninput="calcular()" class="${inputStyle}"></div>
                `;
            }
        }

        function calcular() {
            let volumen = 0;
            const h = parseFloat(document.getElementById('altura').value) || 0;
            if (currentShape === 'cuadrado') {
                const p = parseFloat(document.getElementById('profundidad').value) || 0;
                const l = parseFloat(document.getElementById('largo').value) || 0;
                volumen = h * p * l;
            } else {
                const d = parseFloat(document.getElementById('diametro').value) || 0;
                volumen = Math.PI * Math.pow(d / 2, 2) * h;
            }

            const pesoTotal = volumen * (currentShape === 'cuadrado' ? DENSIDAD_CUADRADA : DENSIDAD_REDONDA);
            const pesoHarina = pesoTotal / (recetaBase.reduce((a, b) => a + b.porcentaje, 0) / 100);

            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            let costoAcumulado = 0;

            recetaBase.forEach(ing => {
                const gramos = (pesoHarina * ing.porcentaje) / 100;
                const costo = gramos * (preciosPorGramo[ing.nombre] || 0);
                costoAcumulado += costo;

                tbody.innerHTML += `
                    <tr class="text-[13px]">
                        <td class="hidden sm:table-cell px-1 py-3 text-gray-300 font-mono text-[10px]">${ing.id}</td>
                        <td class="px-1 py-3 font-semibold text-gray-700">${ing.nombre}</td>
                        <td class="px-1 py-3 text-right font-bold text-orange-600 no-wrap">${Math.round(gramos)}g</td>
                        <td class="px-1 py-3 text-right text-gray-500 font-mono text-[12px] no-wrap">$${costo.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('total-gramos').innerText = Math.round(pesoTotal) + ' g';
            document.getElementById('total-costo').innerText = '$' + costoAcumulado.toFixed(2);
        }

        async function copyToClipboard() {
            let text = `📋 TORTA NARANJA - ${document.getElementById('total-costo').innerText}\n`;
            text += `Masa: ${document.getElementById('total-gramos').innerText}\n---\n`;
            document.querySelectorAll('#tabla-body tr').forEach(tr => {
                const cells = tr.cells;
                const nombre = cells[currentShape==='cuadrado'?1:1].innerText; // Ajuste dinámico de celda
                text += `${nombre}: ${tr.querySelector('.text-orange-600').innerText}\n`;
            });
            await navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        window.onload = () => { renderInputs(); calcular(); };
    </script>
</body>
</html>
